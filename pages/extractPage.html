<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Editor | Extract Pages</title>
    <link rel="stylesheet" href="../styles/common.css" />
    <link rel="stylesheet" href="../styles/extract_style.css" />
  </head>
  <body>
    <div class="box">
      <p class="warn">file should be pdf!</p>
      <section class="file_box">
        <label for="file-input">
          <p id="filename">select file</p>
        </label>
        <input type="file" name="pdf" id="file-input" style="display: none" />
      </section>
      <input
        type="text"
        value=""
        id="pages-val"
        name="pages"
        style="display: none"
      />
      <section class="page_box">
        <input type="number" name="" placeholder="add page no" id="page-no" />
        <button id="add-btn" type="button">add page no</button>
      </section>

      <div class="or">or</div>
      <section class="rangeInput">
        <span>from</span>
        <input type="number" value="1" id="from" />
        <span>to</span>
        <input type="number" value="2" id="to" />
        <button type="button" id="fromRange">add pages</button>
      </section>
      <section id="pages"></section>

      <section class="button_box">
        <button id="extract-page">extract Page</button>
        <button id="remove-page">remove Page</button>
      </section>
    </div>
  </body>
  <script src="../main.js"></script>
</html>
